<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Phrasal Verb SRS (SM-2)</title>
  <style>
    :root{
      --bg:#f5f6f8;
      --card:#ffffff;
      --text:#111;
      --muted:rgba(17,17,17,.62);
      --line:rgba(17,17,17,.08);
      --shadow: 0 10px 30px rgba(0,0,0,.06);
      --shadow2: 0 6px 16px rgba(0,0,0,.06);
      --radius: 16px;
    }
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Sans","Noto Sans JP",sans-serif;
    }
    .wrap{ max-width:760px; margin:0 auto; padding:16px; padding-bottom: 96px; } /* 下部ナビ分 */

    .topbar{
      display:flex; gap:10px; flex-wrap:wrap; align-items:center;
      margin: 6px 0 14px;
      justify-content:space-between;
    }
    .leftTop{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .pill{
      font-size:12px;
      background: rgba(17,17,17,.06);
      padding: 7px 10px;
      border-radius: 999px;
      color: var(--muted);
      white-space: nowrap;
    }

    .panel{
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .panelHead{
      padding: 14px 14px 10px;
      border-bottom: 1px solid var(--line);
    }
    .panelBody{ padding: 14px; }
    .hint{ font-size:12px; color: var(--muted); margin-top: 10px; }

    .btn{
      border:0;
      padding: 10px 12px;
      border-radius: 12px;
      background:#111;
      color:#fff;
      font-weight:650;
      cursor:pointer;
      box-shadow: var(--shadow2);
      display:inline-flex;
      align-items:center;
      gap:8px;
    }
    .btn.secondary{
      background: rgba(17,17,17,.06);
      color:#111;
      box-shadow:none;
    }
    .btn:disabled{ opacity:.45; cursor:not-allowed; box-shadow:none; }

    select, input[type="search"], input[type="number"], input[type="file"]{
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      width: 100%;
      box-sizing: border-box;
    }

    /* List */
    .list{ display:flex; flex-direction:column; gap:10px; }
    .item{
      width:100%;
      text-align:left;
      border: 1px solid var(--line);
      background:#fff;
      border-radius: 14px;
      padding: 12px 12px;
      box-shadow: 0 6px 16px rgba(0,0,0,.04);
      cursor:pointer;
    }
    .itemTitle{
      font-size:16px;
      line-height:1.4;
      letter-spacing:.2px;
      margin: 0 0 8px;
    }
    .itemSub{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
      font-size:12px;
      color: var(--muted);
    }
    .tag{
      font-size:11px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(17,17,17,.06);
      color:#111;
    }
    .tag.preview{ background: rgba(255, 191, 0, .22); }

    /* Study */
    .actions{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .meta{ font-size: 13px; color: var(--muted); margin-top: 10px; }
    .ratings{ display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; }
    .ratings .btn{ min-width: 120px; box-shadow:none; }

    /* Card tap area */
    .tapCard{
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      background: #fff;
      box-shadow: 0 8px 18px rgba(0,0,0,.05);
      cursor:pointer;
      user-select:none;
    }
    .ja{
      font-size: 22px;
      line-height:1.5;
      margin: 0;
    }
    .en{
      font-size: 18px;
      line-height:1.45;
      margin: 0 0 6px;
    }
    .ipa{
      font-size: 14px;
      color: var(--muted);
      margin: 0;
    }
    .tapHint{
      font-size: 12px;
      color: var(--muted);
      margin-top: 10px;
    }

    /* Settings bottom sheet */
    .overlay{
      position: fixed; inset: 0;
      background: rgba(0,0,0,.35);
      display:none;
      z-index: 999;
    }
    .sheet{
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: #fff;
      border-radius: 18px 18px 0 0;
      box-shadow: 0 -20px 40px rgba(0,0,0,.18);
      transform: translateY(110%);
      transition: transform .18s ease;
      z-index: 1000;
      max-height: 82vh;
      overflow: auto;
    }
    .sheet.open{ transform: translateY(0); }
    .sheetHead{
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .sheetTitle{
      font-weight: 800;
      letter-spacing:.2px;
    }
    .sheetBody{ padding: 14px; }
    .secTitle{
      font-size: 12px;
      color: var(--muted);
      margin: 14px 0 8px;
      text-transform: uppercase;
      letter-spacing:.08em;
    }
    .row2{ display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
    @media (max-width:520px){
      .row2{ grid-template-columns: 1fr; }
    }
    .danger{
      border: 1px solid rgba(255,0,0,.18);
      background: rgba(255,0,0,.04);
      padding: 10px;
      border-radius: 14px;
    }

    /* Bottom nav */
    .bottomNav{
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,.92);
      backdrop-filter: saturate(180%) blur(12px);
      border-top: 1px solid var(--line);
      padding: 10px 12px max(10px, env(safe-area-inset-bottom));
      z-index: 1100;
    }
    .navRow{
      max-width:760px;
      margin: 0 auto;
      display:flex;
      gap:10px;
    }
    .navBtn{
      flex: 1;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 14px;
      padding: 12px 10px;
      font-weight: 700;
      cursor:pointer;
      box-shadow: 0 6px 18px rgba(0,0,0,.06);
    }
    .navBtn.active{
      background:#111;
      color:#fff;
      border-color:#111;
    }

    /* Toast */
    .toast{
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 92px;
      background: rgba(17,17,17,.92);
      color: #fff;
      padding: 10px 12px;
      border-radius: 999px;
      font-size: 13px;
      z-index: 1200;
      display:none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="leftTop">
        <span class="pill" id="status">loading…</span>
        <span class="pill" id="filterInfo">UNIT: All • New/日: 10</span>
      </div>
    </div>

    <div class="panel" id="panel">
      <!-- List View -->
      <div id="listView">
        <div class="panelHead">
          <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
            <input id="searchInput" type="search" placeholder="日本語 / 英語で検索" style="flex:1; min-width: 220px;">
            <button class="btn secondary" id="clearSearchBtn">クリア</button>
          </div>
          <div class="hint">一覧は制限なしで閲覧できます。タップで詳細（学習）へ。</div>
        </div>
        <div class="panelBody">
          <div class="list" id="list"></div>
        </div>
      </div>

      <!-- Study View -->
      <div id="studyView" style="display:none;">
        <div class="panelHead">
          <div class="actions">
            <button class="btn secondary" id="backBtn">← 一覧</button>
            <button class="btn" id="playBtn">▶︎ 音声</button>
            <button class="btn secondary" id="addToLearningBtn" style="margin-left:auto;">学習に追加</button>
            <button class="btn secondary" id="toggleDetailsBtn">詳細</button>
          </div>
        </div>
        <div class="panelBody">
          <div id="tapCard" class="tapCard" aria-label="tap to flip card">
            <p class="ja" id="jaText">—</p>
            <div id="answer" style="display:none; margin-top: 14px;">
              <p class="en" id="enText">—</p>
              <p class="ipa" id="ipaText"></p>
            </div>
          </div>

          <div class="ratings" id="ratings" style="display:none;">
            <button class="btn" id="againBtn">Again</button>
            <button class="btn secondary" id="hardBtn">Hard</button>
            <button class="btn secondary" id="goodBtn">Good</button>
            <button class="btn secondary" id="easyBtn">Easy</button>
          </div>

          <div class="meta" id="meta"></div>
          <div class="meta" id="details" style="display:none;"></div>
          <div class="tapHint">カードをタップすると表⇄裏が切り替わります。</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings bottom sheet -->
  <div class="overlay" id="overlay"></div>
  <div class="sheet" id="sheet">
    <div class="sheetHead">
      <div class="sheetTitle">設定</div>
      <button class="btn secondary" id="closeSheetBtn">閉じる</button>
    </div>
    <div class="sheetBody">
      <div class="secTitle">Learning</div>
      <div class="row2">
        <div>
          <div class="pill" style="display:inline-block;margin-bottom:8px;">New/日</div>
          <input id="newPerDayInput" type="number" min="0" max="200">
          <div class="hint">1日に導入する新規カード数（未導入カードにのみ効きます）</div>
        </div>
        <div>
          <div class="pill" style="display:inline-block;margin-bottom:8px;">UNIT</div>
          <select id="unitFilter">
            <option value="all">All</option>
          </select>
          <div class="hint">学習・一覧・検索の対象UNIT</div>
        </div>
      </div>

      <div class="secTitle">Data</div>
      <div class="row2">
        <button class="btn secondary" id="reloadBtn">CSV再読み込み</button>
        <button class="btn secondary" id="exportBtn">進捗Export</button>
      </div>

      <div style="margin-top:10px;">
        <label class="btn secondary" style="display:inline-flex; gap:8px; align-items:center; cursor:pointer;">
          進捗Import
          <input id="importProgress" type="file" accept="application/json" style="display:none;">
        </label>
      </div>

      <div style="margin-top:14px;" class="danger">
        <div class="secTitle" style="margin-top:0;">Danger zone</div>
        <button class="btn secondary" id="resetBtn">学習データをリセット</button>
        <div class="hint">localStorageの進捗が消えます（必要なら先にExportしてください）</div>
      </div>
    </div>
  </div>

  <!-- Bottom nav -->
  <div class="bottomNav">
    <div class="navRow">
      <button class="navBtn" id="navList">一覧</button>
      <button class="navBtn" id="navToday">今日</button>
      <button class="navBtn" id="navSettings">設定</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script>
    // ===== 設定 =====
    const CSV_URL = "./cards.csv";
    const LS_PROGRESS_KEY = "pv_srs_sm2_v5_progress";
    const LS_SETTINGS_KEY = "pv_srs_sm2_v5_settings";

    const defaultSettings = { newPerDay: 10, unit: "all" };

    function loadSettings() {
      try {
        const raw = localStorage.getItem(LS_SETTINGS_KEY);
        return raw ? { ...defaultSettings, ...JSON.parse(raw) } : { ...defaultSettings };
      } catch { return { ...defaultSettings }; }
    }
    function saveSettings(s) { localStorage.setItem(LS_SETTINGS_KEY, JSON.stringify(s)); }
    let settings = loadSettings();

    // ===== utils =====
    function todayKey(d = new Date()){
      const y=d.getFullYear();
      const m=String(d.getMonth()+1).padStart(2,"0");
      const day=String(d.getDate()).padStart(2,"0");
      return `${y}-${m}-${day}`;
    }
    function addDaysToKey(baseKey, days){
      const [y,m,d]=baseKey.split("-").map(Number);
      const dt=new Date(y,m-1,d);
      dt.setDate(dt.getDate()+days);
      return todayKey(dt);
    }
    function clampMin(n,min){ return n<min?min:n; }
    function downloadText(filename, text){
      const blob=new Blob([text],{type:"application/json;charset=utf-8"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url; a.download=filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }
    function showToast(msg){
      const t=document.getElementById("toast");
      t.textContent=msg;
      t.style.display="block";
      clearTimeout(showToast._timer);
      showToast._timer=setTimeout(()=>t.style.display="none",850);
    }
    function setFilterInfo() {
      const u = settings.unit === "all" ? "All" : `UNIT ${String(Number(settings.unit)).padStart(3,"0")}`;
      document.getElementById("filterInfo").textContent = `${u} • New/日: ${settings.newPerDay}`;
    }

    // ===== SM-2 =====
    function sm2Update(state, quality){
      let ease=state.ease ?? 2.5;
      let reps=state.reps ?? 0;
      let intervalDays=state.intervalDays ?? 0;
      let lapses=state.lapses ?? 0;

      ease = ease + (0.1 - (5-quality)*(0.08 + (5-quality)*0.02));
      ease = clampMin(ease, 1.3);

      if (quality < 3){
        reps = 0;
        lapses += 1;
        intervalDays = 1;
      } else {
        reps += 1;
        if (reps === 1) intervalDays = 1;
        else if (reps === 2) intervalDays = 6;
        else intervalDays = Math.max(1, Math.round(intervalDays * ease));
      }
      const dueDate = addDaysToKey(todayKey(), intervalDays);
      return { ...state, ease, reps, intervalDays, lapses, dueDate, lastReviewedAt: Date.now() };
    }

    // ===== data =====
    let cards = [];
    let progress = {};
    let current = null;
    let revealed = false;
    const audio = new Audio();

    // ===== UI =====
    const statusEl = document.getElementById("status");

    const listViewEl = document.getElementById("listView");
    const studyViewEl = document.getElementById("studyView");
    const listEl = document.getElementById("list");

    const searchInputEl = document.getElementById("searchInput");
    const clearSearchBtn = document.getElementById("clearSearchBtn");

    const backBtn = document.getElementById("backBtn");

    const tapCardEl = document.getElementById("tapCard");
    const jaEl = document.getElementById("jaText");
    const enEl = document.getElementById("enText");
    const ipaEl = document.getElementById("ipaText");
    const answerEl = document.getElementById("answer");
    const ratingsEl = document.getElementById("ratings");
    const metaEl = document.getElementById("meta");
    const detailsEl = document.getElementById("details");

    const playBtn = document.getElementById("playBtn");
    const addToLearningBtn = document.getElementById("addToLearningBtn");
    const toggleDetailsBtn = document.getElementById("toggleDetailsBtn");

    const againBtn = document.getElementById("againBtn");
    const hardBtn = document.getElementById("hardBtn");
    const goodBtn = document.getElementById("goodBtn");
    const easyBtn = document.getElementById("easyBtn");

    // bottom nav
    const navListBtn = document.getElementById("navList");
    const navTodayBtn = document.getElementById("navToday");
    const navSettingsBtn = document.getElementById("navSettings");

    // settings sheet
    const overlayEl = document.getElementById("overlay");
    const sheetEl = document.getElementById("sheet");
    const closeSheetBtn = document.getElementById("closeSheetBtn");

    const newPerDayInputEl = document.getElementById("newPerDayInput");
    const unitFilterEl = document.getElementById("unitFilter");
    const reloadBtn = document.getElementById("reloadBtn");
    const resetBtn = document.getElementById("resetBtn");
    const exportBtn = document.getElementById("exportBtn");
    const importProgressEl = document.getElementById("importProgress");

    function goList(){ location.hash="#list"; }
    function goToday(){ location.hash="#today"; }
    function goCard(id){ location.hash=`#card=${encodeURIComponent(id)}`; }

    function showListView(){ listViewEl.style.display="block"; studyViewEl.style.display="none"; }
    function showStudyView(){ listViewEl.style.display="none"; studyViewEl.style.display="block"; }

    function setActiveNav(tab){
      navListBtn.classList.toggle("active", tab==="list");
      navTodayBtn.classList.toggle("active", tab==="today");
      navSettingsBtn.classList.toggle("active", tab==="settings");
    }

    // ===== progress =====
    function loadProgress(){
      try{
        const raw=localStorage.getItem(LS_PROGRESS_KEY);
        progress = raw ? JSON.parse(raw) : {};
      }catch{ progress={}; }
    }
    function saveProgress(){ localStorage.setItem(LS_PROGRESS_KEY, JSON.stringify(progress)); }

    function ensureStateForCard(id){
      if (!progress[id]){
        progress[id] = {
          ease:2.5, reps:0, intervalDays:0, lapses:0,
          dueDate: todayKey(),
          lastReviewedAt:null,
          introducedOn: null
        };
        return;
      }
      if (progress[id].introducedOn === undefined){
        progress[id].introducedOn = "2000-01-01";
      }
      if (!progress[id].dueDate) progress[id].dueDate = todayKey();
      if (progress[id].ease == null) progress[id].ease = 2.5;
      if (progress[id].reps == null) progress[id].reps = 0;
      if (progress[id].intervalDays == null) progress[id].intervalDays = 0;
      if (progress[id].lapses == null) progress[id].lapses = 0;
      if (progress[id].lastReviewedAt === undefined) progress[id].lastReviewedAt = null;
    }

    function isIntroduced(card){ return !!progress[card.id]?.introducedOn; }

    function getFilteredCards(){
      const unit = settings.unit;
      const q = (searchInputEl.value||"").trim().toLowerCase();
      const base = (unit==="all") ? cards : cards.filter(c => Number(c.unit)===Number(unit));
      if (!q) return base;
      return base.filter(c => (c.ja||"").toLowerCase().includes(q) || (c.en||"").toLowerCase().includes(q));
    }

    function countIntroducedToday(scopeCards){
      const t=todayKey();
      let n=0;
      for (const c of scopeCards){
        if (progress[c.id]?.introducedOn === t) n++;
      }
      return n;
    }
    function remainingNewSlots(scopeCards){
      const used = countIntroducedToday(scopeCards);
      return Math.max(0, Number(settings.newPerDay) - used);
    }

    function introduceCard(card){
      const t=todayKey();
      const st=progress[card.id];
      st.introducedOn = t;
      if (!st.dueDate || st.dueDate > t) st.dueDate = t;
      saveProgress();
    }

    function introduceNewCardsAuto(maxCount, scopeCards){
      const slots = remainingNewSlots(scopeCards);
      const count = Math.min(slots, maxCount);
      if (count<=0) return 0;

      const locked = scopeCards
        .filter(c => !isIntroduced(c))
        .slice()
        .sort((a,b)=>(a.unit-b.unit)||(a.idx-b.idx));

      let introduced=0;
      for (const c of locked){
        if (introduced>=count) break;
        introduceCard(c);
        introduced++;
      }
      return introduced;
    }

    function dueList(scopeCards){
      const t=todayKey();
      const list=[];
      for (const c of scopeCards){
        const st=progress[c.id];
        if (!st?.introducedOn) continue;
        if ((st.dueDate||"9999-99-99") <= t) list.push(c);
      }
      return list;
    }
    function pickNextDueCard(scopeCards){
      const due=dueList(scopeCards);
      if (due.length===0) return null;
      return due[Math.floor(Math.random()*due.length)];
    }

    function renderStatus(){
      const scope=getFilteredCards();
      const due = dueList(scope).length;
      const newLeft = remainingNewSlots(scope);
      statusEl.textContent = `Today ${due} / New残 ${newLeft}`;
      setFilterInfo();
    }

    function renderList(){
      const scope = getFilteredCards().slice().sort((a,b)=>(a.unit-b.unit)||(a.idx-b.idx));
      listEl.innerHTML="";
      if (scope.length===0){
        const div=document.createElement("div");
        div.style.color="rgba(17,17,17,.62)";
        div.textContent="該当するカードがありません。";
        listEl.appendChild(div);
        return;
      }

      for (const c of scope){
        const st = progress[c.id];
        const introduced = !!st.introducedOn;

        const btn=document.createElement("button");
        btn.className="item";
        btn.type="button";
        btn.onclick=()=>goCard(c.id);

        const title=document.createElement("div");
        title.className="itemTitle";
        title.textContent=c.ja;

        const sub=document.createElement("div");
        sub.className="itemSub";

        const unit=document.createElement("span");
        unit.textContent=`UNIT ${String(c.unit).padStart(3,"0")} • ${c.id}`;
        sub.appendChild(unit);

        if (!introduced){
          const tag=document.createElement("span");
          tag.className="tag preview";
          tag.textContent="プレビュー";
          sub.appendChild(tag);
        }

        btn.appendChild(title);
        btn.appendChild(sub);
        listEl.appendChild(btn);
      }
    }

    function setGradeEnabled(enabled){
      againBtn.disabled = !enabled;
      hardBtn.disabled = !enabled;
      goodBtn.disabled = !enabled;
      easyBtn.disabled = !enabled;
    }

    function renderCard(card){
      current=card;
      revealed=false;
      answerEl.style.display="none";
      ratingsEl.style.display="none";
      detailsEl.style.display="none";

      if (!card){
        jaEl.textContent="今日は復習がありません 🎉";
        enEl.textContent=""; ipaEl.textContent="";
        metaEl.textContent="";
        playBtn.disabled=true;
        addToLearningBtn.style.display="none";
        setGradeEnabled(false);
        return;
      }

      const st=progress[card.id];
      const introduced = !!st.introducedOn;

      jaEl.textContent=card.ja;
      enEl.textContent=card.en;
      ipaEl.textContent=card.ipa||"";
      playBtn.disabled=!card.audioUrl;

      metaEl.textContent = `UNIT ${String(card.unit).padStart(3,"0")} • ${card.id}` + (introduced ? "" : " • プレビュー");
      addToLearningBtn.style.display = introduced ? "none" : "inline-flex";
      addToLearningBtn.disabled = remainingNewSlots(getFilteredCards()) <= 0;

      setGradeEnabled(introduced);

      detailsEl.textContent = introduced
        ? `due: ${st.dueDate} | interval: ${st.intervalDays}d | ease: ${Number(st.ease).toFixed(2)} | reps: ${st.reps} | lapses: ${st.lapses}`
        : `未導入のため採点できません（New枠があれば「学習に追加」できます）`;
    }

    function flipCard(){
      if (!current) return;
      const showing = answerEl.style.display !== "none";
      if (showing){
        answerEl.style.display="none";
        ratingsEl.style.display="none";
      } else {
        answerEl.style.display="block";
        // 導入済みのみ採点ボタンを表示
        const introduced = !!progress[current.id]?.introducedOn;
        ratingsEl.style.display = introduced ? "flex" : "none";
      }
      revealed = !showing;
    }

    async function playCurrentAudio(){
      if (!current?.audioUrl) return;
      try{
        audio.src=current.audioUrl;
        audio.preload="auto";
        await audio.play();
      }catch{
        alert("再生できませんでした。もう一度タップしてください。");
      }
    }

    function grade(quality){
      if (!current) return;

      const st = progress[current.id];
      if (!st?.introducedOn){
        alert("このカードはプレビューです。「学習に追加」すると採点できます。");
        return;
      }

      progress[current.id] = sm2Update(st, quality);
      saveProgress();

      const scope=getFilteredCards();
      renderStatus();

      const next = pickNextDueCard(scope);
      if (next){
        renderCard(next);
        // 次のカードは表面から
        answerEl.style.display="none";
        ratingsEl.style.display="none";
        revealed=false;
      } else {
        goList();
      }
    }

    function buildUnitFilter(){
      const keep = unitFilterEl.querySelector('option[value="all"]');
      unitFilterEl.innerHTML="";
      unitFilterEl.appendChild(keep);
      const units = Array.from(new Set(cards.map(c=>Number(c.unit)))).sort((a,b)=>a-b);
      for (const u of units){
        const opt=document.createElement("option");
        opt.value=String(u);
        opt.textContent=`UNIT ${String(u).padStart(3,"0")}`;
        unitFilterEl.appendChild(opt);
      }
    }

    function renderByHash(){
      const h = location.hash || "#today";
      renderStatus();

      if (h === "#list"){
        setActiveNav("list");
        showListView();
        renderList();
        return;
      }

      if (h === "#today"){
        setActiveNav("today");
        // 今日の学習：期限カードへ（なければ新規1枚導入）
        const scope=getFilteredCards();
        let next = pickNextDueCard(scope);
        if (!next){
          const added = introduceNewCardsAuto(1, scope);
          if (added>0) next = pickNextDueCard(scope);
        }
        showStudyView();
        renderCard(next || null);
        return;
      }

      if (h.startsWith("#card=")){
        setActiveNav("today");
        const id = decodeURIComponent(h.slice(6));
        const card = cards.find(c=>c.id===id);
        showStudyView();
        renderCard(card || null);
        return;
      }

      // fallback
      goToday();
    }

    // settings sheet
    function openSheet(){
      overlayEl.style.display="block";
      sheetEl.classList.add("open");
      document.body.style.overflow="hidden";
      setActiveNav("settings");
    }
    function closeSheet(){
      overlayEl.style.display="none";
      sheetEl.classList.remove("open");
      document.body.style.overflow="";
      // 戻り先は現在のhashに合わせる
      const h = location.hash || "#today";
      setActiveNav(h==="#list" ? "list" : "today");
    }

    async function loadCsv(){
      statusEl.textContent="loading…";
      const res = await fetch(CSV_URL, { cache:"no-store" });
      if (!res.ok) throw new Error(`CSV fetch failed: ${res.status}`);
      const text = await res.text();

      const parsed = Papa.parse(text, { header:true, skipEmptyLines:true });
      cards = (parsed.data||[]).map(r=>({
        unit:Number(r.unit),
        idx:Number(r.idx),
        theme:(r.theme??"").trim(),
        ja:(r.ja??"").trim(),
        en:(r.en??"").trim(),
        ipa:(r.ipa??"").trim(),
        audioUrl:(r.audioUrl??"").trim(),
        id:(r.id??"").trim(),
      })).filter(c=>c.id && c.ja && c.en);

      for (const c of cards) ensureStateForCard(c.id);
      saveProgress();

      buildUnitFilter();
      unitFilterEl.value = settings.unit;
      newPerDayInputEl.value = settings.newPerDay;

      // 初回起動時に今日の学習が開始できるように枠ぶん導入
      introduceNewCardsAuto(9999, getFilteredCards());

      renderByHash();
    }

    // ===== events =====
    window.addEventListener("hashchange", renderByHash);

    // bottom nav
    navListBtn.addEventListener("click", goList);
    navTodayBtn.addEventListener("click", goToday);
    navSettingsBtn.addEventListener("click", openSheet);

    backBtn.addEventListener("click", goList);

    // card tap flip
    tapCardEl.addEventListener("click", (e)=>{
      // 音声ボタンは外にあるので干渉しない想定
      flipCard();
    });

    playBtn.addEventListener("click", (e)=>{
      e.stopPropagation();
      playCurrentAudio();
    });

    addToLearningBtn.addEventListener("click", (e)=>{
      e.stopPropagation();
      if (!current) return;
      const scope=getFilteredCards();
      if (remainingNewSlots(scope) <= 0){
        alert("今日の新規枠がありません。設定でNew/日を増やすか、明日以降にしてください。");
        return;
      }
      introduceCard(current);
      renderStatus();
      renderCard(current);
      // 裏を見ていたら採点を有効にするため表示更新
      if (revealed){
        ratingsEl.style.display = "flex";
      }
      showToast("学習に追加");
    });

    toggleDetailsBtn.addEventListener("click", ()=>{
      detailsEl.style.display = (detailsEl.style.display==="none") ? "block" : "none";
    });

    againBtn.addEventListener("click", ()=>grade(1));
    hardBtn.addEventListener("click", ()=>grade(3));
    goodBtn.addEventListener("click", ()=>grade(4));
    easyBtn.addEventListener("click", ()=>grade(5));

    // list search
    searchInputEl.addEventListener("input", ()=>{
      if ((location.hash||"#today")==="#list") renderList();
      renderStatus();
    });
    clearSearchBtn.addEventListener("click", ()=>{
      searchInputEl.value="";
      renderByHash();
    });

    // settings open/close
    closeSheetBtn.addEventListener("click", closeSheet);
    overlayEl.addEventListener("click", closeSheet);

    // settings fields
    newPerDayInputEl.value = settings.newPerDay;
    unitFilterEl.value = settings.unit;

    newPerDayInputEl.addEventListener("change", ()=>{
      const v = Number(newPerDayInputEl.value);
      settings.newPerDay = Number.isFinite(v) ? Math.max(0, Math.min(200, v)) : defaultSettings.newPerDay;
      newPerDayInputEl.value = settings.newPerDay;
      saveSettings(settings);
      introduceNewCardsAuto(9999, getFilteredCards());
      renderByHash();
      showToast(`New/日 = ${settings.newPerDay}`);
    });

    unitFilterEl.addEventListener("change", ()=>{
      settings.unit = unitFilterEl.value;
      saveSettings(settings);
      introduceNewCardsAuto(9999, getFilteredCards());
      renderByHash();
      showToast(`UNIT変更`);
    });

    // data actions
    reloadBtn.addEventListener("click", async ()=>{
      await loadCsv();
      showToast("CSV再読み込み");
    });

    exportBtn.addEventListener("click", ()=>{
      const payload = { version: 5, exportedAt: new Date().toISOString(), progress, settings };
      downloadText("pv_srs_progress.json", JSON.stringify(payload, null, 2));
      showToast("Export完了");
    });

    importProgressEl.addEventListener("change", async (e)=>{
      const file=e.target.files?.[0];
      if (!file) return;
      const text=await file.text();
      try{
        const obj=JSON.parse(text);
        if (!obj?.progress) throw new Error("invalid");
        progress=obj.progress;
        if (obj.settings){
          settings = { ...defaultSettings, ...obj.settings };
          saveSettings(settings);
          newPerDayInputEl.value = settings.newPerDay;
          unitFilterEl.value = settings.unit;
        }
        saveProgress();
        for (const c of cards) ensureStateForCard(c.id);
        saveProgress();
        introduceNewCardsAuto(9999, getFilteredCards());
        renderByHash();
        showToast("Import完了");
      }catch{
        alert("インポート失敗：ファイルが違う可能性があります");
      }finally{
        importProgressEl.value="";
      }
    });

    resetBtn.addEventListener("click", ()=>{
      if (!confirm("学習データ（localStorage）を消します。OK？（先にExport推奨）")) return;
      localStorage.removeItem(LS_PROGRESS_KEY);
      loadProgress();
      for (const c of cards) ensureStateForCard(c.id);
      saveProgress();
      introduceNewCardsAuto(9999, getFilteredCards());
      renderByHash();
      showToast("リセットしました");
    });

    // ===== boot =====
    loadProgress();
    setFilterInfo();

    // 初期表示は「今日」
    if (!location.hash) location.hash = "#today";

    loadCsv().catch(err=>{
      console.error(err);
      statusEl.textContent="CSV読み込み失敗";
      setActiveNav("today");
      showStudyView();
      jaEl.textContent="cards.csv をリポジトリ直下に置いたか確認してください。";
    });
  </script>
</body>
</html>
